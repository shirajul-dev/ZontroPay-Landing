<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ করুন | ZontroPay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">যন্ত্র<span>পে</span></div>
        <div class="nav-links">
            <a href="index.html">হোম</a>
            <a href="contact.html" class="active">যোগাযোগ</a>
        </div>
        <div class="menu-toggle"><span></span><span></span><span></span></div>
    </nav>

    <section>
        <div class="section-title reveal">
            <h1>আমাদের সাথে যোগাযোগ করুন</h1>
            <p>যেকোনো প্রশ্ন বা সহযোগিতার জন্য আমাদের মেসেজ দিন</p>
        </div>

        <div class="contact-container reveal">
            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label>আপনার নাম</label>
                        <input type="text" placeholder="নাম লিখুন" required>
                    </div>
                    <div class="form-group">
                        <label>ইমেইল ঠিকানা</label>
                        <input type="email" placeholder="ইমেইল লিখুন" required>
                    </div>
                    <div class="form-group">
                        <label>মেসেজ</label>
                        <textarea placeholder="আপনার মেসেজ এখানে লিখুন..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">পাঠিয়ে দিন</button>
                </form>
            </div>
            <div class="contact-info">
                <h3>অফিস ঠিকানা</h3>
                <p>লেভেল ৫, সফটওয়্যার টেকনোলজি পার্ক,<br>কারওয়ান বাজার, ঢাকা-১২১৫, বাংলাদেশ।</p>
                <br>
                <h3>ফোন</h3>
                <p>+৮৮০ ১৭০০-০০০০০০</p>
                <br>
                <h3>ইমেইল</h3>
                <p>info@zontropay.com</p>
                <br>
                <div style="width: 100%; height: 300px; border-radius: 15px; overflow: hidden; box-shadow: var(--shadow);">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3651.9024424301394!2d90.3910801154316!3d23.750867194676735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755b8bd55555555%3A0x5555555555555555!2sSoftware%20Technology%20Park!5e0!3m2!1sen!2sbd!4v1647684567890!5m2!1sen!2sbd" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
